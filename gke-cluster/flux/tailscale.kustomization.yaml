apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tailscale
    namespace: flux-system
spec:
    interval: 10m0s
    path: ./gke-cluster/flux/apps/tailscale
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    healthChecks:
        - apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          name: tailscale-operator
          namespace: flux-system
        - apiVersion: apps/v1
          kind: Deployment
          name: operator
          namespace: tailscale-operator
    decryption:
        provider: sops
        secretRef:
            name: sops-age
