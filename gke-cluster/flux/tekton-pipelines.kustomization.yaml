apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tekton-pipelines
    namespace: flux-system
spec:
    dependsOn:
        - name: tekton
    interval: 10m0s
    path: ./gke-cluster/flux/apps/tekton-pipelines
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    decryption:
        provider: sops
        secretRef:
            name: sops-age
