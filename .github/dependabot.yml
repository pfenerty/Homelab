version: 2

# Dependency update coverage:
#
#   GitHub Actions  — managed here by dependabot (github-actions ecosystem).
#   Nix flake inputs — dependabot does not support Nix; updates are handled by
#                      the weekly `nix flake update` workflow in
#                      .github/workflows/update-flake.yml, which opens a PR
#                      with a refreshed flake.lock for review.

updates:
  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
