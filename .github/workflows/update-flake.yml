name: Update flake inputs

# Dependabot does not support Nix flakes, so we use this workflow instead.
# It runs nix flake update weekly and opens a PR so changes can be reviewed
# before they land on main — mirroring the dependabot PR flow for other
# ecosystems.
on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight UTC
  workflow_dispatch: # Allow manual triggering from the Actions tab

jobs:
  update:
    name: nix flake update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Update flake inputs
        run: nix flake update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update flake inputs"
          title: "chore: update flake inputs"
          body: |
            Automated weekly update of `flake.lock` produced by `nix flake update`.

            Review the diff in `flake.lock` to see which inputs changed and by how much before merging.
          branch: automated/flake-update
          labels: dependencies
          delete-branch: true
