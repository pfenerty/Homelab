name: Check flake

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Verify flake.lock is committed
        run: |
          if [ ! -f flake.lock ]; then
            echo "ERROR: flake.lock is missing. Run 'nix flake lock' and commit the result."
            echo "The lock file is what actually pins inputs to specific git revisions."
            exit 1
          fi

      - name: Check flake
        run: nix flake check
