apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: metrics-server
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
    interval: 10m0s
    path: ./talos-cluster/flux/apps/metrics-server
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    healthChecks:
        - apiVersion: helm.toolkit.fluxcd.io/v2
          kind: HelmRelease
          name: metrics-server
          namespace: flux-system
        - apiVersion: apps/v1
          kind: Deployment
          name: kube-system-metrics-server
          namespace: kube-system
