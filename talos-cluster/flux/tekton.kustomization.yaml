apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: tekton
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
    interval: 10m0s
    path: ./talos-cluster/flux/apps/tekton
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    healthChecks:
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-pipelines-controller
          namespace: tekton-pipelines
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-pipelines-webhook
          namespace: tekton-pipelines
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-triggers-controller
          namespace: tekton-pipelines
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-triggers-webhook
          namespace: tekton-pipelines
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-dashboard
          namespace: tekton-pipelines
        - apiVersion: apps/v1
          kind: Deployment
          name: tekton-pipelines-remote-resolvers
          namespace: tekton-pipelines-resolvers
