apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
    name: cloudflare-gateway
    namespace: flux-system
spec:
    dependsOn:
        - name: cilium
        - name: gateway-api
    interval: 10m0s
    path: ./talos-cluster/flux/apps/cloudflare-gateway
    prune: true
    sourceRef:
        kind: GitRepository
        name: flux-system
    healthChecks:
        - apiVersion: kustomize.toolkit.fluxcd.io/v1
          kind: Kustomization
          name: cloudflare-gateway-controller-install
          namespace: flux-system
        - apiVersion: apps/v1
          kind: Deployment
          name: cloudflare-controller-manager
          namespace: cloudflare-gateway
    decryption:
        provider: sops
        secretRef:
            name: sops-age
