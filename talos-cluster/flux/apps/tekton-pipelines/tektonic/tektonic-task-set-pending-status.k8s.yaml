apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: tektonic-set-pending-status
  namespace: tektonic-ci
spec:
  params:
    - name: revision
      type: string
    - name: repo-full-name
      type: string
  stepTemplate:
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
  steps:
    - command:
        - gh
        - api
        - repos/$(params.repo-full-name)/statuses/$(params.revision)
        - -f
        - state=pending
        - -f
        - context=tektonic-ci
        - -f
        - description=Pipeline running
      env:
        - name: GH_TOKEN
          valueFrom:
            secretKeyRef:
              key: token
              name: github-token
      image: maniator/gh:v2.88.1
      name: set-pending
