apiVersion: batch/v1
kind: CronJob
metadata:
    name: renovate
    namespace: renovate
spec:
    schedule: "@daily"
    concurrencyPolicy: Forbid
    startingDeadlineSeconds: 60
    jobTemplate:
        spec:
            template:
                spec:
                    securityContext:
                        runAsNonRoot: true
                        seccompProfile:
                            type: RuntimeDefault
                    containers:
                        - name: renovate
                          image: renovate/renovate:latest
                          env:
                              - name: LOG_LEVEL
                                value: debug
                              - name: RENOVATE_AUTODISCOVER
                                value: "true"
                          envFrom:
                              - secretRef:
                                    name: renovate-env
                          resources:
                              requests:
                                  cpu: 250m
                                  memory: 512Mi
                              limits:
                                  cpu: "2"
                                  memory: 2Gi
                          securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                  drop:
                                      - ALL
                    restartPolicy: Never
