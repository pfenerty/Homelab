apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: metrics-server
    namespace: flux-system
spec:
    interval: 30m
    chart:
        spec:
            chart: metrics-server
            version: "3.13.0"
            sourceRef:
                kind: HelmRepository
                name: metrics-server
                namespace: flux-system
            interval: 12h
    targetNamespace: kube-system
